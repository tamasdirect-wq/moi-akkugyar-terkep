<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MOI Akkugyár térkép (HU)</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    html, body { height:100%; margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; }
    #wrap { display:flex; height:100%; }
    #sidebar {
      width: 360px; max-width: 92vw;
      border-right: 1px solid #ddd;
      padding: 10px 10px 12px 10px;
      overflow:auto;
      background:#fff;
    }
    #map { flex:1; height:100%; }

    .title { font-size:18px; font-weight:800; margin: 2px 0 8px 0; }
    .sub { font-size:12px; color:#555; line-height:1.35; margin-bottom:10px; }

    .row { display:flex; gap:8px; align-items:center; margin: 8px 0; }
    select, input {
      width:100%;
      padding:8px 10px;
      border:1px solid #ccc; border-radius:10px;
      font-size:14px;
    }
    .legend {
      display:grid; grid-template-columns: 14px 1fr; gap:8px 10px;
      margin: 10px 0 8px 0; font-size:13px;
    }
    .dot { width:12px; height:12px; border-radius:999px; margin-top:3px; }
    .list { margin-top:10px; }
    .item {
      border:1px solid #eee; border-radius:12px;
      padding:10px; margin:8px 0;
      cursor:pointer;
      background:#fff;
    }
    .item:hover { background:#f7f7f7; }
    .item .h { font-weight:800; }
    .item .m { font-size:12px; color:#555; margin-top:2px; }
    .badge {
      display:inline-block;
      font-size:11px;
      padding:3px 8px;
      border-radius:999px;
      border:1px solid #ddd;
      margin-top:6px;
      color:#333;
      background:#fafafa;
    }

    /* mobil: sidebar felül */
    @media (max-width: 900px) {
      #wrap { flex-direction:column; }
      #sidebar { width:auto; border-right:none; border-bottom:1px solid #ddd; }
      #map { height: calc(100vh - 320px); }
    }
  </style>
</head>

<body>
<div id="wrap">
  <div id="sidebar">
    <div class="title">MOI Akkugyár térkép (HU)</div>
    <div class="sub">
      Pontok = akkuipari létesítmények (gyár / alapanyag / újrahasznosítás / EV).<br>
      Kattints a listában vagy a térképen a részletekhez.
    </div>

    <div class="row">
      <input id="q" placeholder="Keresés: település / cég / megjegyzés" />
    </div>
    <div class="row">
      <select id="cat">
        <option value="ALL">Minden kategória</option>
        <option value="CELL">Cella-gyár</option>
        <option value="PACK">Modul / pack / összeszerelés</option>
        <option value="MATERIAL">Beszállító / alapanyag</option>
        <option value="RECYCLE">Hulladék / újrahasznosítás</option>
        <option value="EV">Járműgyár (EV/Busz)</option>
      </select>
    </div>

    <div class="legend" id="legend"></div>

    <div class="row" style="margin-top:10px;">
      <label style="display:flex; gap:10px; align-items:center; font-size:13px; color:#333;">
        <input id="toggleWaters" type="checkbox" checked />
        Vizek (fő folyók) réteg
      </label>
    </div>

    <div class="row">
      <label style="display:flex; gap:10px; align-items:center; font-size:13px; color:#333;">
        <input id="togglePop" type="checkbox" />
        Település “lakosság-buborék” réteg (ha feltöltöd adatokkal)
      </label>
    </div>

    <div class="list" id="list"></div>
  </div>

  <div id="map"></div>
</div>

<script>
  // ---------- SZÍNEK / KATEGÓRIÁK ----------
  const CATS = {
    CELL:     { label: "Cella-gyár",                color: "#d32f2f" },
    PACK:     { label: "Modul / pack / összeszer.", color: "#f57c00" },
    MATERIAL: { label: "Beszállító / alapanyag",    color: "#1976d2" },
    RECYCLE:  { label: "Hulladék / újrahasznosítás",color: "#2e7d32" },
    EV:       { label: "Járműgyár (EV/Busz)",       color: "#6a1b9a" },
  };

  // ---------- ADATOK (BŐVÍTHETŐ LISTA) ----------
  // IMPORTANT: ha akarsz 100%-os teljességet, ide kell felvinni az összes helyet.
  // Én most egy stabil "alap készletet" adok, ami működik és jól néz ki.
  // Koordináta: lat, lon (fok). Megjegyzés: status lehet: "működik", "épül", "tervezett".
  const SITES = [
    // Debrecen
    { id:"catl_deb",   cat:"CELL",     name:"CATL",               muni:"Debrecen", county:"Hajdú-Bihar", status:"épül/ütemezés", lat:47.5316, lon:21.6273, note:"Cella-gyár beruházás.", source:"nyilvános hírek/kommunikáció" },
    { id:"eve_deb",    cat:"CELL",     name:"EVE Power",          muni:"Debrecen", county:"Hajdú-Bihar", status:"tervezett/épül", lat:47.5316, lon:21.7000, note:"Cella-gyár/akkumulátor beruházás.", source:"nyilvános hírek/kommunikáció" },
    { id:"bmw_deb",    cat:"PACK",     name:"BMW (akkumulátor/EV)", muni:"Debrecen", county:"Hajdú-Bihar", status:"épül", lat:47.5200, lon:21.6600, note:"Jármű/akkurendszer kapcsolódás.", source:"nyilvános hírek/kommunikáció" },
    { id:"semcorp_deb",cat:"MATERIAL", name:"SEMCORP (szeparátor)",muni:"Debrecen", county:"Hajdú-Bihar", status:"épül/tervezett", lat:47.5450, lon:21.7050, note:"Szeparátor/anyaggyártás.", source:"nyilvános hírek/kommunikáció" },
    { id:"ecopro_deb", cat:"MATERIAL", name:"EcoPro (katódanyag)", muni:"Debrecen", county:"Hajdú-Bihar", status:"tervezett/épül", lat:47.5600, lon:21.6900, note:"Katódanyag/előanyag.", source:"nyilvános hírek/kommunikáció" },

    // Göd
    { id:"samsung_god",cat:"CELL",     name:"Samsung SDI",        muni:"Göd", county:"Pest", status:"működik", lat:47.7067, lon:19.1359, note:"Cella/akku gyártás.", source:"nyilvános hírek/kommunikáció" },

    // Iváncsa
    { id:"sk_ivancsa", cat:"CELL",     name:"SK On",              muni:"Iváncsa", county:"Fejér", status:"működik/épül", lat:47.1527, lon:18.8266, note:"Akkumulátor gyártás (SK On).", source:"nyilvános hírek/kommunikáció" },

    // Komárom
    { id:"sk_komarom", cat:"CELL",     name:"SK On (Komárom)",    muni:"Komárom", county:"Komárom-Esztergom", status:"működik", lat:47.7430, lon:18.1220, note:"Akkumulátor gyártás.", source:"nyilvános hírek/kommunikáció" },
    { id:"byd_bus_kom",cat:"EV",       name:"BYD (buszgyár)",     muni:"Komárom", county:"Komárom-Esztergom", status:"működik", lat:47.7400, lon:18.1250, note:"Elektromos busz összeszerelés.", source:"nyilvános hírek/kommunikáció" },

    // Nyíregyháza térség
    { id:"sunwoda_ny", cat:"CELL",     name:"Sunwoda",            muni:"Nyíregyháza", county:"Szabolcs-Szatmár-Bereg", status:"tervezett/épül", lat:47.9500, lon:21.7000, note:"Akkumulátor/energia tárolás kapcsolódás.", source:"nyilvános hírek/kommunikáció" },

    // Szeged
    { id:"byd_szeged", cat:"EV",       name:"BYD (EV-gyár)",      muni:"Szeged", county:"Csongrád-Csanád", status:"tervezett/épül", lat:46.2530, lon:20.1414, note:"Személyautó EV gyár (bejelentett).", source:"nyilvános hírek/kommunikáció" },

    // Példa újrahasznosítás (ha van konkrét magyar helyed, ide add hozzá)
    // { id:"recycle_x", cat:"RECYCLE", name:"(Cég)", muni:"(Település)", county:"", status:"", lat:0, lon:0, note:"black mass / feldolgozás", source:"" },
  ];

  // ---------- (OPCIONÁLIS) LAKOSSÁG BUBORÉKOK ----------
  // IDE TÖLTS LAKOSSÁGOT: {muni:"Debrecen", pop:201000, lat:47.5316, lon:21.6273}
  // Ha nincs adat, hagyd üresen. A réteg kapcsoló így is működik.
  const POP = [
    // { muni:"Debrecen", pop: 200000, lat:47.5316, lon:21.6273 },
    // { muni:"Göd",      pop: 21000,  lat:47.7067, lon:19.1359 },
  ];

  // ---------- TÉRKÉP ----------
  const map = L.map("map", { zoomControl: true }).setView([47.1, 19.5], 7);

  const baseOSM = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  const baseTopo = L.tileLayer("https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png", {
    maxZoom: 17,
    attribution: '&copy; OpenTopoMap'
  });

  const baseEsri = L.tileLayer(
    "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
    { maxZoom: 19, attribution: "Esri" }
  );

  const baseLayers = { "OSM": baseOSM, "Domborzat": baseTopo, "Műhold": baseEsri };

  // ---------- VIZEK (EGYSZERŰ FŐ FOLYÓK) ----------
  // Nem “teljes hidrológia”, viszont látvány és használhatóság oké.
  const waters = L.layerGroup();
  const danube = L.polyline(
    [[48.3,17.1],[47.8,18.0],[47.5,18.9],[47.0,19.0],[46.3,18.9],[45.9,18.7]],
    { weight: 3, opacity: 0.75 }
  ).addTo(waters);
  const tisza = L.polyline(
    [[48.2,22.0],[47.9,21.7],[47.7,21.4],[47.2,20.7],[46.8,20.2],[46.3,20.1]],
    { weight: 3, opacity: 0.75 }
  ).addTo(waters);

  // ---------- POP RÉTEG ----------
  const popLayer = L.layerGroup();

  function popRadius(pop){
    // skála: sqrt
    return Math.max(6, Math.sqrt(pop) * 0.7);
  }

  function buildPop(){
    popLayer.clearLayers();
    POP.forEach(p => {
      if (!p.pop) return;
      L.circleMarker([p.lat, p.lon], {
        radius: popRadius(p.pop),
        weight: 1,
        fillOpacity: 0.15
      }).bindTooltip(`${p.muni}: ~${p.pop.toLocaleString("hu-HU")} fő`, {sticky:true})
        .addTo(popLayer);
    });
  }
  buildPop();

  // ---------- PONTOK RÉTEGE ----------
  const siteLayer = L.layerGroup().addTo(map);

  function markerStyle(cat){
    return {
      radius: 8,
      weight: 2,
      color: CATS[cat]?.color || "#111",
      fillColor: CATS[cat]?.color || "#111",
      fillOpacity: 0.85
    };
  }

  const markersById = new Map();

  function makePopup(s){
    const catLabel = CATS[s.cat]?.label || s.cat;
    const lines = [
      `<div style="font-weight:900;font-size:15px;margin-bottom:6px">${s.name}</div>`,
      `<div><b>Település:</b> ${s.muni} (${s.county || "-"})</div>`,
      `<div><b>Kategória:</b> ${catLabel}</div>`,
      `<div><b>Státusz:</b> ${s.status || "-"}</div>`,
      s.note ? `<div style="margin-top:6px"><b>Megjegyzés:</b> ${s.note}</div>` : "",
      s.source ? `<div style="margin-top:6px;color:#666;font-size:12px">Forrás: ${s.source}</div>` : ""
    ].filter(Boolean);
    return lines.join("");
  }

  function rebuildMarkers(filterText, filterCat){
    siteLayer.clearLayers();
    markersById.clear();

    const ft = (filterText || "").trim().toLowerCase();
    const cat = filterCat || "ALL";

    const filtered = SITES.filter(s => {
      if (cat !== "ALL" && s.cat !== cat) return false;
      if (!ft) return true;
      const hay = `${s.name} ${s.muni} ${s.county||""} ${s.note||""} ${s.status||""}`.toLowerCase();
      return hay.includes(ft);
    });

    filtered.forEach(s => {
      const m = L.circleMarker([s.lat, s.lon], markerStyle(s.cat))
        .bindPopup(makePopup(s))
        // FELIRAT: ez az, ami neked hiányzott
        .bindTooltip(`${s.muni} – ${s.name}`, { permanent: true, direction: "top", offset:[0,-10], opacity: 0.9 })
        .addTo(siteLayer);

      markersById.set(s.id, m);
    });

    rebuildList(filtered);
  }

  // ---------- LISTA ----------
  const listEl = document.getElementById("list");

  function rebuildList(rows){
    listEl.innerHTML = "";
    if (!rows.length) {
      listEl.innerHTML = `<div style="color:#666;font-size:13px;margin-top:10px">Nincs találat a szűrésre.</div>`;
      return;
    }

    rows
      .slice()
      .sort((a,b) => (a.muni+a.name).localeCompare(b.muni+b.name, "hu"))
      .forEach(s => {
        const div = document.createElement("div");
        div.className = "item";
        div.innerHTML = `
          <div class="h">${s.muni} — ${s.name}</div>
          <div class="m">${(s.county||"-")} • ${CATS[s.cat]?.label || s.cat} • ${s.status||"-"}</div>
          <div class="badge" style="border-color:${CATS[s.cat]?.color||"#ddd"}">${s.cat}</div>
        `;
        div.onclick = () => {
          const m = markersById.get(s.id);
          if (!m) return;
          map.setView([s.lat, s.lon], Math.max(map.getZoom(), 11));
          m.openPopup();
        };
        listEl.appendChild(div);
      });
  }

  // ---------- LEGEND ----------
  const legendEl = document.getElementById("legend");
  function buildLegend(){
    legendEl.innerHTML = "";
    Object.entries(CATS).forEach(([k,v]) => {
      const d = document.createElement("div");
      d.className = "dot";
      d.style.background = v.color;
      const t = document.createElement("div");
      t.textContent = v.label;
      legendEl.appendChild(d);
      legendEl.appendChild(t);
    });
  }
  buildLegend();

  // ---------- RÉTEG VÁLASZTÓ ----------
  L.control.layers(baseLayers, {
    "Akkupontok": siteLayer,
    "Vizek": waters,
    "Lakosság buborékok": popLayer
  }, { collapsed: false }).addTo(map);

  // defaults
  waters.addTo(map);

  // ---------- UI KÖTÉS ----------
  const qEl = document.getElementById("q");
  const catEl = document.getElementById("cat");
  const toggleWaters = document.getElementById("toggleWaters");
  const togglePop = document.getElementById("togglePop");

  function applyFilters(){
    rebuildMarkers(qEl.value, catEl.value);
  }

  qEl.addEventListener("input", applyFilters);
  catEl.addEventListener("change", applyFilters);

  toggleWaters.addEventListener("change", () => {
    if (toggleWaters.checked) waters.addTo(map);
    else map.removeLayer(waters);
  });

  togglePop.addEventListener("change", () => {
    if (togglePop.checked) popLayer.addTo(map);
    else map.removeLayer(popLayer);
  });

  // első render
  rebuildMarkers("", "ALL");
</script>
</body>
</html>

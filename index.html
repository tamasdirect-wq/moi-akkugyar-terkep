<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MOI Akkugyár térkép (HU) – gyárak + települések + lakosság + vizek</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    html, body { height: 100%; margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    #wrap { display: grid; grid-template-columns: 360px 1fr; height: 100%; }
    #sidebar { border-right: 1px solid #e5e5e5; padding: 12px; overflow: auto; background: #fff; }
    #map { height: 100%; }

    h1 { font-size: 16px; margin: 0 0 8px; }
    .muted { color: #666; font-size: 12px; line-height: 1.35; }
    .box { background: #f7f7f7; border: 1px solid #e5e5e5; border-radius: 10px; padding: 10px; margin: 10px 0; }
    .row { display: flex; gap: 8px; align-items: center; }
    input[type="text"] { width: 100%; padding: 8px; border-radius: 10px; border: 1px solid #ddd; outline: none; }
    .tag { display:inline-block; padding: 3px 8px; border-radius: 999px; font-size: 12px; border:1px solid #ddd; background:#fff; }
    .dot { width:10px; height:10px; border-radius:50%; display:inline-block; margin-right:6px; vertical-align:middle; }
    .list { margin: 8px 0 0; padding: 0; list-style: none; }
    .list li { padding: 8px; border: 1px solid #eee; border-radius: 10px; margin: 6px 0; cursor: pointer; }
    .list li:hover { background: #fafafa; }
    .small { font-size: 12px; color:#666; }
    .hr { height:1px; background:#eee; margin: 10px 0; }

    /* Mobile */
    @media (max-width: 900px) {
      #wrap { grid-template-columns: 1fr; grid-template-rows: 320px 1fr; }
      #sidebar { border-right:none; border-bottom:1px solid #e5e5e5; }
    }

    /* Leaflet label */
    .place-label {
      background: rgba(255,255,255,0.85);
      border: 1px solid rgba(0,0,0,0.15);
      padding: 2px 6px;
      border-radius: 8px;
      font-size: 12px;
      white-space: nowrap;
    }
  </style>
</head>

<body>
<div id="wrap">
  <div id="sidebar">
    <h1>MOI Akkugyár térkép (HU)</h1>
    <div class="muted">
      Rétegek: gyárak / beszállítók / hulladék-újrahasznosítás / modul-pack + lakosság buborék + vizek.<br>
      Jobb felül tudsz réteget kapcsolni. Bal oldalt listázás és keresés.
    </div>

    <div class="box">
      <div class="row">
        <input id="q" type="text" placeholder="Keresés: település / cég / típus..." />
      </div>
      <div class="hr"></div>
      <div class="row" style="flex-wrap:wrap">
        <span class="tag"><span class="dot" style="background:#d9534f"></span>Cella-gyár</span>
        <span class="tag"><span class="dot" style="background:#0275d8"></span>Beszállító/anyag</span>
        <span class="tag"><span class="dot" style="background:#5cb85c"></span>Hulladék/újrahaszn.</span>
        <span class="tag"><span class="dot" style="background:#f0ad4e"></span>Modul/pack</span>
        <span class="tag"><span class="dot" style="background:#6f42c1"></span>Település (lakosság)</span>
      </div>
    </div>

    <div class="muted"><b>Találatok:</b></div>
    <ul id="list" class="list"></ul>
  </div>

  <div id="map"></div>
</div>

<script>
  // ---------------------------
  // 1) ALAP TÉRKÉP
  // ---------------------------
  const map = L.map('map', { preferCanvas: true }).setView([47.1625, 19.5033], 7); // HU közepe

  const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap közreműködők'
  }).addTo(map);

  const topo = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
    maxZoom: 17,
    attribution: '&copy; OpenTopoMap'
  });

  // ---------------------------
  // 2) SZÍNEK + JELÖLŐK
  // ---------------------------
  const COLORS = {
    cella: "#d9534f",
    beszallito: "#0275d8",
    hulladek: "#5cb85c",
    modul: "#f0ad4e",
    telepules: "#6f42c1",
    viz: "#2b8cbe"
  };

  function pinIcon(color) {
    // egyszerű, kicsi kör marker (canvas gyors)
    return { color };
  }

  function circleMarker(lat, lon, color, radius=7) {
    return L.circleMarker([lat, lon], {
      radius,
      color: "#111",
      weight: 1,
      fillColor: color,
      fillOpacity: 0.95
    });
  }

  function labelFor(text) {
    return L.divIcon({
      className: 'place-label',
      html: text,
      iconSize: null
    });
  }

  // ---------------------------
  // 3) ADATOK – IDE MÁSOLGATOD BE A "MINDENT"
  // ---------------------------
  // Akkus helyek: egy sor = egy pont
  // type: "cella" | "beszallito" | "hulladek" | "modul"
  const akkLocations = [
    // PÉLDÁK – EZT BŐVÍTSD
    { type:"cella", telepules:"Debrecen", ceg:"CATL", statusz:"tervezett/épül", lat:47.5316, lon:21.6273, megj:"Nagyüzem / akkucella gyártás" },
    { type:"modul", telepules:"Göd", ceg:"Samsung SDI", statusz:"működik", lat:47.6825, lon:19.1340, megj:"Modul/pack + kapcsolódó tevékenységek" },
    { type:"beszallito", telepules:"Komárom", ceg:"(példa beszállító)", statusz:"működik", lat:47.7430, lon:18.1190, megj:"Alapanyag / beszállítói lánc" },
    { type:"hulladek", telepules:"Salgótarján", ceg:"(példa újrahaszn.)", statusz:"tervezett", lat:48.0987, lon:19.8030, megj:"Hulladékkezelés/újrahasznosítás" }
  ];

  // Települések lakossággal (buborék): egy sor = település
  // pop: lakosság (szám)
  const settlements = [
    // PÉLDÁK – EZT BŐVÍTSD
    { telepules:"Debrecen", lat:47.5316, lon:21.6273, pop:201000 },
    { telepules:"Göd", lat:47.6825, lon:19.1340, pop:22000 },
    { telepules:"Komárom", lat:47.7430, lon:18.1190, pop:19000 },
    { telepules:"Salgótarján", lat:48.0987, lon:19.8030, pop:34000 }
  ];

  // Vizek GeoJSON (folyók/tavak). Ha nincs, marad üres.
  // Ha van GeoJSON-od, ide be tudod másolni:
  const watersGeoJson = null; // vagy { "type":"FeatureCollection", ... }

  // ---------------------------
  // 4) RÉTEGEK LÉTREHOZÁSA
  // ---------------------------
  const layerCella = L.layerGroup();
  const layerBesz = L.layerGroup();
  const layerHull = L.layerGroup();
  const layerModul = L.layerGroup();
  const layerTelepules = L.layerGroup();
  const layerVizek = L.layerGroup();

  // akk helyek felrakása + label + popup
  const allFeatureMarkers = []; // listához

  function typeLabel(t){
    if(t==="cella") return "Cella-gyár";
    if(t==="beszallito") return "Beszállító / anyag";
    if(t==="hulladek") return "Hulladék / újrahasznosítás";
    if(t==="modul") return "Modul / pack";
    return t;
  }

  function typeColor(t){
    return COLORS[t] || "#999";
  }

  akkLocations.forEach((x) => {
    const m = circleMarker(x.lat, x.lon, typeColor(x.type), 8);

    const popup = `
      <div style="min-width:240px">
        <div style="font-size:14px"><b>${x.telepules}</b> – ${typeLabel(x.type)}</div>
        <div class="small"><b>Cég:</b> ${x.ceg || "-"}</div>
        <div class="small"><b>Státusz:</b> ${x.statusz || "-"}</div>
        <div class="small"><b>Megjegyzés:</b> ${x.megj || "-"}</div>
        <div class="small" style="margin-top:6px;color:#999">
          Koordináta: ${x.lat.toFixed(5)}, ${x.lon.toFixed(5)}
        </div>
      </div>
    `;
    m.bindPopup(popup);

    // Felirat (mindig látszó címke) – település + cégnév
    const lblText = `${x.telepules}${x.ceg ? " – " + x.ceg : ""}`;
    const lbl = L.marker([x.lat, x.lon], {
      icon: labelFor(lblText),
      interactive: false
    });

    // rétegbe pakolás típus szerint
    if (x.type === "cella") { layerCella.addLayer(m); layerCella.addLayer(lbl); }
    if (x.type === "beszallito") { layerBesz.addLayer(m); layerBesz.addLayer(lbl); }
    if (x.type === "hulladek") { layerHull.addLayer(m); layerHull.addLayer(lbl); }
    if (x.type === "modul") { layerModul.addLayer(m); layerModul.addLayer(lbl); }

    allFeatureMarkers.push({ kind:"akku", data:x, marker:m });
  });

  // település buborékok (lakosság)
  function popRadius(pop){
    // log skála, hogy ne legyen óriás
    const r = Math.max(6, Math.min(40, 6 + Math.log10(Math.max(1000, pop)) * 6));
    return r;
  }

  settlements.forEach((s) => {
    const m = L.circleMarker([s.lat, s.lon], {
      radius: popRadius(s.pop),
      color: "#111",
      weight: 1,
      fillColor: COLORS.telepules,
      fillOpacity: 0.35
    });

    m.bindPopup(`
      <div style="min-width:220px">
        <div style="font-size:14px"><b>${s.telepules}</b> – Lakosság</div>
        <div class="small"><b>Becsült lakosság:</b> ${Number(s.pop).toLocaleString('hu-HU')} fő</div>
        <div class="small" style="margin-top:6px;color:#999">
          Koordináta: ${s.lat.toFixed(5)}, ${s.lon.toFixed(5)}
        </div>
      </div>
    `);

    layerTelepules.addLayer(m);
    allFeatureMarkers.push({ kind:"telepules", data:s, marker:m });
  });

  // vizek (GeoJSON)
  if (watersGeoJson) {
    const gj = L.geoJSON(watersGeoJson, {
      style: { color: COLORS.viz, weight: 2, opacity: 0.9 }
    });
    layerVizek.addLayer(gj);
  }

  // alapból bekapcsolt rétegek
  layerCella.addTo(map);
  layerBesz.addTo(map);
  layerHull.addTo(map);
  layerModul.addTo(map);
  layerTelepules.addTo(map);
  // layerVizek.addTo(map); // ha van adat, nyugodtan alapból is

  // ---------------------------
  // 5) RÉTEGVÁLASZTÓ
  // ---------------------------
  const baseLayers = { "OSM": osm, "Domborzat (Topo)": topo };

  const overlays = {
    "Cella-gyár": layerCella,
    "Beszállító / anyag": layerBesz,
    "Hulladék / újrahaszn.": layerHull,
    "Modul / pack": layerModul,
    "Település buborék (lakosság)": layerTelepules,
    "Vizek (GeoJSON)": layerVizek
  };

  L.control.layers(baseLayers, overlays, { collapsed: true, position: "topright" }).addTo(map);

  // ---------------------------
  // 6) BAL OLDALI LISTA + KERESÉS
  // ---------------------------
  const listEl = document.getElementById('list');
  const qEl = document.getElementById('q');

  function itemText(item){
    if(item.kind==="akku"){
      const x = item.data;
      return `${x.telepules} – ${typeLabel(x.type)} – ${x.ceg || ""}`.trim();
    }
    const s = item.data;
    return `${s.telepules} – lakosság: ${Number(s.pop).toLocaleString('hu-HU')}`;
  }

  function renderList(filter=""){
    const f = filter.trim().toLowerCase();
    listEl.innerHTML = "";

    const shown = allFeatureMarkers
      .filter(it => itemText(it).toLowerCase().includes(f))
      .slice(0, 500); // ne ölje meg a böngészőt

    shown.forEach(it => {
      const li = document.createElement('li');

      if(it.kind==="akku"){
        const x = it.data;
        li.innerHTML = `
          <div><b>${x.telepules}</b> <span class="small">(${typeLabel(x.type)})</span></div>
          <div class="small">${x.ceg || "-"} • ${x.statusz || "-"}</div>
        `;
      } else {
        const s = it.data;
        li.innerHTML = `
          <div><b>${s.telepules}</b> <span class="small">(település)</span></div>
          <div class="small">Lakosság: ${Number(s.pop).toLocaleString('hu-HU')}</div>
        `;
      }

      li.addEventListener('click', () => {
        const latlng = it.marker.getLatLng ? it.marker.getLatLng() : null;
        if(latlng){
          map.setView(latlng, 11, { animate: true });
          if(it.marker.openPopup) it.marker.openPopup();
        }
      });

      listEl.appendChild(li);
    });

    if(shown.length === 0){
      const li = document.createElement('li');
      li.innerHTML = `<div class="small">Nincs találat.</div>`;
      listEl.appendChild(li);
    }
  }

  qEl.addEventListener('input', (e) => renderList(e.target.value));
  renderList("");

  // ---------------------------
  // 7) AUTO ZOOM A PONTOKRA (ha vannak)
  // ---------------------------
  const bounds = [];
  akkLocations.forEach(x => bounds.push([x.lat, x.lon]));
  settlements.forEach(s => bounds.push([s.lat, s.lon]));
  if(bounds.length > 0){
    map.fitBounds(bounds, { padding: [30, 30] });
  }
</script>
</body>
</html>
